<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vet Tech Trainer PRO</title>

<style>
body { font-family: Arial; max-width: 900px; margin: 40px auto; text-align: center; }

button {
  padding: 12px;
  margin: 6px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.answer {
  display: block;
  width: 100%;
  background: #eee;
  margin: 8px 0;
}

.correct { background: #4CAF50; color: white; }
.wrong { background: #f44336; color: white; }

.hidden { display: none; }

#question { font-size: 22px; margin: 20px 0; white-space: pre-line; }

#confidenceBox { margin: 15px 0; }
</style>
</head>

<body>

<h1>Vet Tech Trainer</h1>

<!-- MENU -->
<div id="menu">
  <h2>Step 1: Mode</h2>
  <button onclick="setMode('confidence')">🧠 Confidence</button>
  <button onclick="setMode('study')">📚 Study</button>
  <button onclick="setMode('exam')">🧪 Exam</button>

  <h2>Step 2: Category</h2>
  <button onclick="startCategory('fluid')">Fluid Therapy</button>
  <button onclick="startCategory('history')">History & Physical</button>
  <button onclick="startCategory('emergency')">Emergency</button>
  <button onclick="startMixed()">🔥 Full Exam</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <h3 id="modeLabel"></h3>
  <div id="progress"></div>
  <div id="question"></div>

  <div id="confidenceBox" class="hidden">
    <p>Do you know this?</p>
    <button onclick="setConfidence(true)">Yes</button>
    <button onclick="setConfidence(false)">Not sure</button>
  </div>

  <div id="answers"></div>
  <div id="feedback"></div>

  <button onclick="nextQuestion()">Next</button>
  <button onclick="home()">🏠 Home</button>
</div>

<!-- RESULTS -->
<div id="results" class="hidden">
  <h2>Exam Results</h2>
  <div id="resultScore"></div>
  <div id="resultPercent"></div>
  <div id="resultStatus"></div>

  <h3>Missed Questions</h3>
  <ul id="missedList"></ul>

  <button onclick="home()">🏠 Home</button>
</div>

<script>

// MODE
let mode = "confidence";

// STATE
let queue = [];
let current = null;
let qIndex = 0;
let totalQ = 0;
let score = 0;
let confidence = null;
let missed = [];

// ===== QUESTIONS (EXPANDED 75) =====

const fluid = [
{q:"LRS is:",a:["Isotonic","Hypotonic","Hypertonic","Colloid"],c:0},
{q:"Maintenance phase is for:",a:["Stable patients","Shock","Trauma","Emergency"],c:0},
{q:"Total body water %:",a:["30","45","60","80"],c:2},
{q:"ICF means:",a:["Inside cells","Outside cells","Blood","GI"],c:0},
{q:"ECF means:",a:["Outside cells","Inside cells","Bone","Lung"],c:0},
{q:"Hypotonic fluids treat:",a:["Hypernatremia","Shock","Pain","None"],c:0},
{q:"Colloids expand:",a:["Vascular space","Cells","GI","Bone"],c:0},
{q:"Fluid overload causes:",a:["Pulmonary edema","Weight loss","Normal","None"],c:0},
{q:"Dextrose treats:",a:["Hypoglycemia","Hyperglycemia","Pain","None"],c:0},
{q:"Potassium treats:",a:["Hypokalemia","Hyperkalemia","Pain","None"],c:0},
// add more if desired
];

const history = [
{q:"CRT measures:",a:["Perfusion","Temp","Digestion","Vision"],c:0},
{q:"Otoscope used for:",a:["Ears","Eyes","Heart","Skin"],c:0},
{q:"Signalment includes:",a:["Age breed sex","Only age","Only weight","None"],c:0},
{q:"Entropion:",a:["Inward eyelid","Outward","None","Pain"],c:0},
{q:"Ectropion:",a:["Outward eyelid","Inward","None","Pain"],c:0},
{q:"Normal MM color:",a:["Pink","Blue","White","Green"],c:0},
{q:"Stertor:",a:["Low sound","High wheeze","None","Normal"],c:0},
{q:"Stridor:",a:["High sound","Low","None","Normal"],c:0},
{q:"GI exam includes:",a:["Palpation","Eyes","Skin","None"],c:0},
{q:"Neuro exam includes:",a:["Reflexes","Hair","Skin","None"],c:0},
];

const emergency = [
{q:"Shock causes:",a:["Poor perfusion","Good flow","None","Heat"],c:0},
{q:"CPR rate:",a:["100-120","50","200","10"],c:0},
{q:"Triage means:",a:["Prioritize","Treat","Ignore","None"],c:0},
{q:"Pulse ox measures:",a:["Oxygen","BP","Temp","Glucose"],c:0},
{q:"Crash cart is for:",a:["Emergency tools","Food","None","Beds"],c:0},
{q:"Septic shock:",a:["Infection","Trauma","Pain","None"],c:0},
{q:"GDV is:",a:["Emergency","Normal","Skin","None"],c:0},
{q:"Thoracocentesis:",a:["Chest fluid","GI","Bone","None"],c:0},
{q:"Airway priority:",a:["Airway","Skin","Hair","None"],c:0},
{q:"Emergency goal:",a:["Stabilize","Feed","Discharge","None"],c:0},
];

// ===== MODE =====
function setMode(m){
  mode = m;
  alert("Mode: " + m);
}

// ===== START =====
function startCategory(type){
  if(type==="fluid") queue = [...fluid];
  if(type==="history") queue = [...history];
  if(type==="emergency") queue = [...emergency];
  start();
}

function startMixed(){
  queue = [...fluid,...history,...emergency];
  start();
}

function start(){
  shuffle(queue);
  totalQ = queue.length;
  qIndex = 0;
  score = 0;
  missed = [];

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("results").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.getElementById("modeLabel").innerText = "Mode: " + mode;

  nextQuestion();
}

// ===== QUESTION =====
function nextQuestion(){

  if(queue.length===0){
    if(mode==="exam"){
      showResults();
    } else {
      alert("Done!");
      home();
    }
    return;
  }

  current = queue.shift();
  qIndex++;

  document.getElementById("progress").innerText =
    "Question " + qIndex + " of " + totalQ;

  document.getElementById("question").innerText = current.q;

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").innerText = "";

  let shuffled = current.a.map((a,i)=>({text:a,correct:i===current.c}))
  .sort(()=>Math.random()-0.5);

  shuffled.forEach(item=>{
    let btn = document.createElement("button");
    btn.innerText = item.text;
    btn.className = "answer";
    btn.onclick = ()=>answer(item.correct,btn);
    document.getElementById("answers").appendChild(btn);
  });

  if(mode==="confidence"){
    document.getElementById("confidenceBox").classList.remove("hidden");
    document.getElementById("answers").classList.add("hidden");
  } else {
    document.getElementById("confidenceBox").classList.add("hidden");
    document.getElementById("answers").classList.remove("hidden");
  }
}

function setConfidence(val){
  confidence = val;
  document.getElementById("answers").classList.remove("hidden");
  document.getElementById("confidenceBox").classList.add("hidden");
}

// ===== ANSWER =====
function answer(correct,btn){

  let buttons = document.querySelectorAll(".answer");
  buttons.forEach(b=>b.disabled=true);

  if(correct){
    score++;
    if(mode!=="exam") btn.classList.add("correct");
  } else {
    if(mode!=="exam") btn.classList.add("wrong");

    missed.push(current.q);

    if(mode!=="exam"){
      queue.push(current);
    }
  }

  if(mode!=="exam"){
    buttons.forEach(b=>{
      if(b.innerText===current.a[current.c]){
        b.classList.add("correct");
      }
    });
  }

  if(mode==="study"){
    document.getElementById("feedback").innerText =
      correct ? "Correct!" : "Incorrect — review.";
  }

  if(mode==="confidence"){
    if(confidence && !correct){
      feedback.innerText="You thought you knew it — review.";
    } else if(!confidence && correct){
      feedback.innerText="Nice — you knew it!";
    }
  }
}

// ===== RESULTS =====
function showResults(){

  document.getElementById("game").classList.add("hidden");
  document.getElementById("results").classList.remove("hidden");

  let percent = Math.round((score/totalQ)*100);

  resultScore.innerText = "Score: " + score + "/" + totalQ;
  resultPercent.innerText = "Percent: " + percent + "%";
  resultStatus.innerText = percent>=70 ? "PASS" : "Needs Review";

  let list = document.getElementById("missedList");
  list.innerHTML="";
  missed.forEach(q=>{
    let li=document.createElement("li");
    li.innerText=q;
    list.appendChild(li);
  });
}

// ===== UTIL =====
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function home(){
  location.reload();
}

</script>

</body>
</html>
