<h1>Vet Tech Trainer</h1>
<div class="muted">Confidence Recall Mode Added</div>

<div id="menu" class="card">

    <button class="menu-btn" onclick="startCategory('fluid')">Fluid Therapy</button>

    <button class="menu-btn" onclick="startCategory('emergency')">Emergency</button>
  </div>
  <div>
    <button class="menu-btn" onclick="startMixed()">🔥 Full Exam (Mixed)</button>
  </div>
  <p class="small">
    Confidence mode asks: “Do you know this?” before choices appear.
  </p>
</div>

<div id="game" class="card hidden">
  <div id="meta"></div>
  <div id="scoreboard">Score: 0 / 0</div>
  <div id="confidenceBoard">Confidence: 0 known / 0 unsure</div>

  <div id="question"></div>

  <div id="confidencePrompt">
    <p><strong>Before you see the choices...</strong></p>
    <button onclick="setConfidence(true)">✅ I know it</button>
    <button onclick="setConfidence(false)">🤔 Not sure</button>
  </div>

  <div id="answers" class="hidden"></div>

  <div id="feedback"></div>

  <div id="topControls">
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" class="hidden" onclick="restartSameMode()">Restart This Set</button>
    <button id="backBtn" onclick="goHome()">Back to Menu</button>

/* =========================
   APP STATE
   ========================= */

let queue = [];
let originalSet = [];
let currentQ = null;
let currentMode = "";
let currentTitle = "";

let totalAnswered = 0;
let totalCorrect = 0;
let confidenceKnown = 0;
let confidenceUnsure = 0;
let currentConfidence = null;

/* =========================
   HELPERS
   ========================= */

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function cloneQuestions(arr) {
  return arr.map(q => ({
    q: q.q,
    a: [...q.a],
    correct: q.correct,
    explanation: q.explanation
  }));
}

function updateBoards() {
  document.getElementById("scoreboard").textContent =
    `Score: ${totalCorrect} / ${totalAnswered}`;

  document.getElementById("confidenceBoard").textContent =
    `Confidence: ${confidenceKnown} known / ${confidenceUnsure} unsure`;
}

function showChoices() {
  document.getElementById("answers").classList.remove("hidden");
  document.getElementById("confidencePrompt").classList.add("hidden");
}

function resetQuestionUI() {
  document.getElementById("feedback").textContent = "";
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("restartBtn").classList.add("hidden");
  document.getElementById("answers").classList.add("hidden");
  document.getElementById("confidencePrompt").classList.remove("hidden");
  currentConfidence = null;
}

function renderAnswers() {
  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  currentQ.a.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = answer;
    btn.onclick = () => checkAnswer(index, btn);
    answersDiv.appendChild(btn);
  });
}

/* =========================
   START MODES
   ========================= */

function startCategory(type) {
  currentMode = type;

  if (type === "fluid") {
    originalSet = cloneQuestions(fluid);
    currentTitle = "Fluid Therapy";
  } else if (type === "history") {
    originalSet = cloneQuestions(history);
    currentTitle = "History & Physical";
  } else if (type === "emergency") {
    originalSet = cloneQuestions(emergency);
    currentTitle = "Emergency";
  }

  launchGame();
}

function startMixed() {
  currentMode = "mixed";
  currentTitle = "Full Mixed Exam";
  originalSet = cloneQuestions([...fluid, ...history, ...emergency]);
  launchGame();
}

function launchGame() {
  queue = cloneQuestions(originalSet);
  shuffle(queue);

  totalAnswered = 0;
  totalCorrect = 0;
  confidenceKnown = 0;
  confidenceUnsure = 0;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("meta").textContent =
    `${currentTitle} • ${queue.length} starting questions • Confidence Recall Mode`;

  updateBoards();
  nextQuestion();
}

/* =========================
   QUESTION FLOW
   ========================= */

function nextQuestion() {
  if (queue.length === 0) {
    document.getElementById("question").textContent = "🎉 Finished!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("answers").classList.add("hidden");
    document.getElementById("confidencePrompt").classList.add("hidden");
    document.getElementById("feedback").innerHTML =
      `Final Score: <strong>${totalCorrect} / ${totalAnswered}</strong><br>` +
      `Confidence: <strong>${confidenceKnown}</strong> known, <strong>${confidenceUnsure}</strong> unsure`;
    document.getElementById("nextBtn").classList.add("hidden");
    document.getElementById("restartBtn").classList.remove("hidden");
    return;
  }

  currentQ = queue.shift();
  document.getElementById("question").textContent = currentQ.q;

  resetQuestionUI();
  renderAnswers();
}

function setConfidence(knowsIt) {
  currentConfidence = knowsIt;

  if (knowsIt) {
    confidenceKnown++;
  } else {
    confidenceUnsure++;
  }

  updateBoards();
  showChoices();
}

function checkAnswer(selectedIndex, clickedBtn) {
  const buttons = document.querySelectorAll(".answer-btn");
  const gotItRight = selectedIndex === currentQ.correct;
  totalAnswered++;

  buttons.forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === currentQ.correct) {
      btn.classList.add("correct");
    }
  });

  if (gotItRight) {
    totalCorrect++;
  } else {
    clickedBtn.classList.add("wrong");
    queue.push(currentQ);
  }

  let confidenceText = "";
  if (currentConfidence === true && gotItRight) {
    confidenceText = "You said you knew it, and you were right. Great sign.";
  } else if (currentConfidence === true && !gotItRight) {
    confidenceText = "You felt confident, but missed it. That means this one needs another pass.";
  } else if (currentConfidence === false && gotItRight) {
    confidenceText = "Nice job. You were unsure, but got it right.";
  } else if (currentConfidence === false && !gotItRight) {
    confidenceText = "Good call marking it unsure. It will come back again.";
  }

  document.getElementById("feedback").innerHTML =
    `<strong>${gotItRight ? "Correct." : "Not quite."}</strong> ${currentQ.explanation}<br><br>${confidenceText}`;

  updateBoards();
  document.getElementById("nextBtn").classList.remove("hidden");
}

function restartSameMode() {
  if (currentMode === "mixed") {
    startMixed();
  } else {
    startCategory(currentMode);
  }
}

function goHome() {
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("game").classList.add("hidden");
}
</script>

</html>
