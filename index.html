<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vet Tech Trainer PRO</title>

<style>
body {
  font-family: Arial;
  max-width: 800px;
  margin: 40px auto;
  text-align: center;
}

button {
  padding: 12px;
  margin: 6px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn {
  display: block;
  width: 100%;
  background: #eee;
  margin: 8px 0;
}

.correct { background: #4CAF50; color: white; }
.wrong { background: #f44336; color: white; }

.hidden { display: none; }

#question {
  font-size: 22px;
  margin: 20px 0;
  white-space: pre-line;
}

#score {
  margin: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Vet Tech Trainer</h1>

<div id="menu">
  <h2>Step 1: Choose Mode</h2>
  <button onclick="setMode('confidence')">🧠 Confidence Mode</button>
  <button onclick="setMode('study')">📚 Study Mode</button>
  <button onclick="setMode('exam')">🧪 Exam Mode</button>

  <h2>Step 2: Choose Topic</h2>
  <button onclick="startCategory('fluid')">Fluid Therapy</button>
  <button onclick="startCategory('history')">History & Physical</button>
  <button onclick="startCategory('emergency')">Emergency</button>
  <button onclick="startMixed()">🔥 Full Exam (Mixed)</button>
</div>

<div id="game" class="hidden">
  <h3 id="modeLabel"></h3>
  <div id="score"></div>
  <div id="question"></div>

  <div id="confidenceBox">
    <p>Do you know this?</p>
    <button onclick="setConfidence(true)">Yes</button>
    <button onclick="setConfidence(false)">Not sure</button>
  </div>

  <div id="answers"></div>
  <div id="feedback"></div>

  <button onclick="nextQuestion()">Next</button>
  <button onclick="goHome()">🏠 Home</button>
</div>

<script>

// ================= MODE =================
let studyMode = "confidence";

function setMode(m){
  studyMode = m;
  alert("Mode set to: " + m);
}

// ================= QUESTIONS =================

const questions = [
{q:"The maintenance phase of fluid therapy is used for:",a:["Stable patients","Shock patients","Trauma patients","None"],correct:0},
{q:"Total body water makes up approximately what percentage of the body?",a:["30%","45%","60%","80%"],correct:2},
{q:"ICF stands for:",a:["Intracellular fluid","Internal cell force","Increased cardiac flow","None"],correct:0},
{q:"ECF stands for:",a:["Extracellular fluid","External cardiac function","Electrolyte control fluid","None"],correct:0},
{q:"Which fluid type is used to treat hypernatremia?",a:["Hypotonic fluids","Isotonic fluids","Hypertonic fluids","Colloids"],correct:0},
{q:"Which is an example of an isotonic fluid?",a:["0.9% NaCl","3% NaCl","0.45% NaCl","Dextrose only"],correct:0},
{q:"Lactated Ringers Solution (LRS) is classified as:",a:["Isotonic","Hypotonic","Hypertonic","Colloid"],correct:0},
{q:"Hypertonic fluids are commonly used for:",a:["Head trauma","Mild dehydration","Maintenance","Skin issues"],correct:0},
{q:"Colloids primarily remain in which space?",a:["Vascular space","Intracellular space","GI tract","Bone"],correct:0},
{q:"The resuscitation phase is used to:",a:["Restore vascular volume","Maintain hydration","Feed the patient","Reduce pain"],correct:0},
{q:"Which tool is used to examine the ears?",a:["Otoscope","Ophthalmoscope","Stethoscope","Endoscope"],correct:0},
{q:"Capillary refill time (CRT) is used to assess:",a:["Perfusion","Respiration","Digestion","Temperature"],correct:0},
{q:"Entropion refers to:",a:["Inward rolling eyelid","Outward rolling eyelid","Eye infection","Blindness"],correct:0},
{q:"Triage is best defined as:",a:["Prioritizing patients","Treating patients","Ignoring minor cases","None"],correct:0},
{q:"Shock results in:",a:["Poor tissue perfusion","High oxygen levels","Normal circulation","None"],correct:0},
{q:"Cats in shock often present with:",a:["Bradycardia","Tachycardia","Normal heart rate","None"],correct:0},
{q:"Orthopnea refers to:",a:["Posture to help breathing","Pain posture","Normal stance","None"],correct:0},
{q:"The primary survey follows which sequence?",a:["ABC","XYZ","123","None"],correct:0},
{q:"CPR compression rate should be:",a:["100-120 per minute","50 per minute","200 per minute","10 per minute"],correct:0},
{q:"Which is considered a common emergency?",a:["All listed","GDV","Trauma","Toxin exposure"],correct:0}
];

// ================= GAME =================

let queue = [];
let currentQ;
let score = 0;
let total = 0;
let questionNumber = 0;
let totalQuestions = 0;
let confidence = null;

function startCategory(){
  queue = [...questions];
  startGame();
}

function startMixed(){
  queue = [...questions];
  startGame();
}

function startGame(){
  shuffle(queue);

  totalQuestions = queue.length;
  questionNumber = 0;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.getElementById("modeLabel").innerText = "Mode: " + studyMode;

  score = 0;
  total = 0;

  nextQuestion();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function nextQuestion(){

  if(queue.length===0){
    alert("Final Score: "+score+"/"+total);
    location.reload();
  }

  currentQ = queue.shift();
  questionNumber++;

  document.getElementById("question").innerText =
    "Question " + questionNumber + " of " + totalQuestions + "\n\n" + currentQ.q;

  document.getElementById("feedback").innerText = "";

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  // SHUFFLE ANSWERS
  let shuffled = currentQ.a.map((ans,i)=>({
    ans,
    correct: i===currentQ.correct
  })).sort(()=>Math.random()-0.5);

  shuffled.forEach(item=>{
    let btn = document.createElement("button");
    btn.innerText = item.ans;
    btn.className = "btn";
    btn.onclick = ()=>checkAnswer(item.correct, btn);
    answersDiv.appendChild(btn);
  });

  if(studyMode==="confidence"){
    document.getElementById("confidenceBox").style.display="block";
    document.getElementById("answers").style.display="none";
  } else {
    document.getElementById("confidenceBox").style.display="none";
    document.getElementById("answers").style.display="block";
  }
}

function setConfidence(val){
  confidence = val;
  document.getElementById("answers").style.display="block";
  document.getElementById("confidenceBox").style.display="none";
}

function checkAnswer(isCorrect, btn){

  total++;

  let buttons = document.querySelectorAll(".btn");

  if(isCorrect){
    score++;
    if(studyMode!=="exam") btn.classList.add("correct");
  } else {
    if(studyMode!=="exam") btn.classList.add("wrong");
    queue.push(currentQ);
  }

  if(studyMode!=="exam"){
    buttons.forEach(b=>{
      if(b.onclick.toString().includes("true")){
        b.classList.add("correct");
      }
    });
  }

  if(studyMode==="study"){
    document.getElementById("feedback").innerText =
      isCorrect ? "Correct!" : "Incorrect — review.";
  }

  document.getElementById("score").innerText =
    "Score: "+score+" / "+total;
}

function goHome(){
  location.reload();
}

</script>

</body>
</html>
