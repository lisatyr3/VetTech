<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vet Tech Study Game</title>

<style>
body {
  font-family: Arial;
  max-width: 600px;
  margin: 40px auto;
  text-align: center;
}

.question {
  font-size: 22px;
  margin-bottom: 20px;
}

.btn {
  display: block;
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  background: #eee;
  cursor: pointer;
  border-radius: 8px;
  font-size: 16px;
}

.correct { background: #4CAF50; color: white; }
.wrong { background: #f44336; color: white; }

#nextBtn {
  margin-top: 20px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h1>Vet Tech Trainer</h1>

<div class="question" id="question"></div>

<div id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()">Next</button>

<script>
let questions = [
{
q: "What percentage of the body is made up of water?",
a: ["30%", "45%", "60%", "80%"],
correct: 2
},
{
q: "Which IV fluids have an osmolality equal to blood?",
a: ["Hypotonic", "Isotonic", "Hypertonic", "Colloids"],
correct: 1
},
{
q: "What is the FIRST step in triage?",
a: ["Take temperature", "Full exam", "Primary survey (ABCs)", "Bloodwork"],
correct: 2
},
{
q: "Which tool is used to examine the ear?",
a: ["Ophthalmoscope", "Otoscope", "Stethoscope", "Endoscope"],
correct: 1
},
{
q: "What does CRT stand for?",
a: ["Cardiac Rate Test", "Capillary Refill Time", "Circulatory Response Test", "Cardio Rhythm Timing"],
correct: 1
}
];

let current = 0;

function loadQuestion() {
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  
  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((answer, i) => {
    let btn = document.createElement("button");
    btn.innerText = answer;
    btn.className = "btn";
    
    btn.onclick = () => checkAnswer(btn, i);
    
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(btn, index) {
  let correct = questions[current].correct;
  let buttons = document.querySelectorAll(".btn");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add("correct");
    if (i === index && i !== correct) b.classList.add("wrong");
  });
}

function nextQuestion() {
  current++;
  if (current >= questions.length) current = 0;
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
